services:
  db:
    image: postgres:15
    container_name: lrp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: lrp_proyectos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d lrp_proyectos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
